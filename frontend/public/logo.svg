<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" />

  <!-- Share Icon -->
  <g transform="translate(100, 100)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="12" fill="white" />

    <!-- Top node -->
    <circle cx="0" cy="-45" r="10" fill="white" opacity="0.9" />
    <line x1="0" y1="-12" x2="0" y2="-35" stroke="white" stroke-width="3" />

    <!-- Bottom left node -->
    <circle cx="-39" cy="22.5" r="10" fill="white" opacity="0.9" />
    <line x1="-10.4" y1="6" x2="-29" y2="16.5" stroke="white" stroke-width="3" />

    <!-- Bottom right node -->
    <circle cx="39" cy="22.5" r="10" fill="white" opacity="0.9" />
    <line x1="10.4" y1="6" x2="29" y2="16.5" stroke="white" stroke-width="3" />
  </g>

  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">ShareYourSales</text>
</svg>
