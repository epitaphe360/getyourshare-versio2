<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #4F46E5; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f9fafb; padding: 30px; border: 1px solid #e5e7eb; border-radius: 0 0 8px 8px; }
        .button { display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 6px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bienvenue sur ShareYourSales!</h1>
        </div>
        <div class="content">
            <p>Bonjour,</p>
            <p>Nous sommes ravis de vous compter parmi nous.</p>
            <p>Votre compte a été créé avec succès. Vous pouvez maintenant accéder à votre tableau de bord et commencer à explorer nos opportunités.</p>
            <a href="{{ dashboard_url }}" class="button">Accéder à mon compte</a>
        </div>
    </div>
</body>
</html>
