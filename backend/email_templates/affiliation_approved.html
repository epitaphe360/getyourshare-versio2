<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #10B981; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f9fafb; padding: 30px; border: 1px solid #e5e7eb; border-radius: 0 0 8px 8px; }
        .button { display: inline-block; padding: 12px 24px; background-color: #10B981; color: white; text-decoration: none; border-radius: 6px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Affiliation Approuvée!</h1>
        </div>
        <div class="content">
            <p>Félicitations!</p>
            <p>Votre demande d'affiliation pour <strong>{{ product_name }}</strong> a été approuvée.</p>
            <p><strong>Commission:</strong> {{ commission }}%</p>
            <p>Vous pouvez dès maintenant récupérer votre lien d'affiliation et commencer à promouvoir ce produit.</p>
            <a href="{{ dashboard_url }}" class="button">Voir mon lien</a>
        </div>
    </div>
</body>
</html>
