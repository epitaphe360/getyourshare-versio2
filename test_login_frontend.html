<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Test de connexion API</h1>
    <button onclick="testLogin()">Tester la connexion</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ Test en cours...';
            
            try {
                console.log('🔄 Envoi de la requête de login...');
                
                const response = await fetch('http://127.0.0.1:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include', // Important pour les cookies
                    body: JSON.stringify({
                        email: 'admin@getyourshare.com',
                        password: 'admin123'
                    })
                });

                console.log('📥 Réponse reçue:', response.status);
                
                const data = await response.json();
                console.log('📦 Données:', data);

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ Connexion réussie!\n\n' + 
                        'Email: ' + data.user.email + '\n' +
                        'Rôle: ' + data.user.role + '\n' +
                        'Token: ' + data.access_token.substring(0, 50) + '...';
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ Erreur: ' + (data.detail || 'Connexion échouée');
                }
            } catch (error) {
                console.error('💥 Erreur:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Erreur réseau:\n' + error.message + 
                    '\n\nVérifiez:\n' +
                    '- Le backend est sur http://127.0.0.1:5000\n' +
                    '- CORS est configuré correctement\n' +
                    '- La console du navigateur (F12) pour plus de détails';
            }
        }
    </script>
</body>
</html>
