name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # JOB 1: Lint Backend Python
  # ============================================================================
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      
      - name: Run Ruff (linter)
        working-directory: ./backend
        run: |
          echo "Running Ruff linter..."
          ruff check . --output-format=github
        continue-on-error: true
      
      - name: Run Black (formatter check)
        working-directory: ./backend
        run: |
          echo "Checking code formatting with Black..."
          black --check --diff .
        continue-on-error: true
      
      - name: Run isort (import sorting check)
        working-directory: ./backend
        run: |
          echo "Checking import sorting with isort..."
          isort --check-only --diff .
        continue-on-error: true
      
      - name: Run mypy (type checking)
        working-directory: ./backend
        run: |
          echo "Running mypy type checker..."
          mypy services/ --ignore-missing-imports
        continue-on-error: true

  # ============================================================================
  # JOB 2: Test Backend Python
  # ============================================================================
  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      JWT_SECRET: test-secret-key-for-ci
      ENVIRONMENT: test
      CACHE_ENABLED: "true"
      REDIS_URL: redis://localhost:6379
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run pytest with coverage (seuil 30%)
        working-directory: ./backend
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=30 \
            --junitxml=junit.xml \
            -v --timeout=60 -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/junit.xml

  # ============================================================================
  # JOB 3: Lint Frontend JavaScript/React
  # ============================================================================
  lint-frontend:
    name: Lint Frontend (ESLint/Prettier)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint || true
        continue-on-error: true
      
      - name: Run Prettier check
        working-directory: ./frontend
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,md}"
        continue-on-error: true

  # ============================================================================
  # JOB 4: Build Frontend
  # ============================================================================
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    needs: lint-frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build application
        working-directory: ./frontend
        run: npm run build
        env:
          CI: true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 7

  # ============================================================================
  # JOB 5: Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit (Python deps)
        working-directory: ./backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --skip-editable || true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit (Frontend deps)
        working-directory: ./frontend
        run: |
          npm ci --quiet
          npm audit --audit-level=high || true

      - name: Vérifier qu'aucun secret n'est dans le code
        run: |
          if grep -rn --include='*.py' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=.venv \
            'SUPABASE_SERVICE_ROLE_KEY\s*=' . 2>/dev/null | grep -v 'os.getenv\|process.env'; then
            echo '⚠️ Clé secrète potentiellement exposée !'
            exit 1
          fi
          echo '✅ Aucune clé secrète détectée en clair'
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ============================================================================
  # JOB 6: Deploy Railway (main only)
  # ============================================================================
  deploy-railway:
    name: Deploy to Railway (production)
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --detach
        continue-on-error: false

      - name: Health check post-deploy (30s)
        run: |
          echo "Attente 30s..."
          sleep 30
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy (HTTP 200)"
              exit 0
            fi
            echo "Tentative $i — HTTP $STATUS, retry..."
            sleep 10
          done
          echo "❌ Health check échoué"
          exit 1

  # ============================================================================
  # JOB 7: Summary & Status
  # ============================================================================
  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-frontend, build-frontend]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "Lint Backend:   ${{ needs.lint-backend.result }}"
          echo "Test Backend:   ${{ needs.test-backend.result }}"
          echo "Lint Frontend:  ${{ needs.lint-frontend.result }}"
          echo "Build Frontend: ${{ needs.build-frontend.result }}"

          if [[ "${{ needs.test-backend.result }}" != "success" ]]; then
            echo "::error::Backend tests failed"
            exit 1
          fi

          if [[ "${{ needs.build-frontend.result }}" != "success" ]]; then
            echo "::error::Frontend build failed"
            exit 1
          fi

          echo "✅ All critical checks passed!"

  # ============================================================================
  # JOB 8: Notifier en cas d'échec sur main
  # ============================================================================
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-frontend, build-frontend]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Notify via Resend
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "ci@getyourshare.ma",
              "to": ["${{ secrets.ADMIN_EMAIL }}"],
              "subject": "❌ CI/CD échoué — GetYourShare main",
              "html": "<h2>Le pipeline CI/CD a échoué sur main.</h2><p>Commit: ${{ github.sha }}<br>Auteur: ${{ github.actor }}<br><a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Voir les détails</a></p>"
            }' || true
