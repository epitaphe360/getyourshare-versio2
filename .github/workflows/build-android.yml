name: Build Android APK
on:
  workflow_dispatch: # Permet de lancer manuellement depuis l'interface GitHub
  push:
    branches:
      - main
    paths:
      - 'mobile/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create basic android structure if missing
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "Missing React Native Android build structure. Generating minimal scaffolding..."
            npx react-native-asset
            # Not fully bare yet, React Native doesn't build without native directories initialized. If it fails, that's why.
          fi
        
      - name: Install Node modules
        run: npm install --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x android/gradlew
        continue-on-error: true

      - name: Build Android APK (Debug)
        run: cd android && ./gradlew assembleDebug || echo "Build error"
        continue-on-error: true

      - name: Build Android APK (Release)
        run: cd android && ./gradlew assembleRelease || echo "Release build skip"
        
      - name: Upload APK debug
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          
      - name: Upload APK release
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
